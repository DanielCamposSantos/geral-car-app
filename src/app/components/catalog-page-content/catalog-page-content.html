<main class="catalog-main">
  @if (loading()) {
    <div class="loading-container">
      <div class="spinner"></div>
      <p>Carregando veículos...</p>
    </div>
  } @else if (error()) {
    <div class="error-container">
      <p>{{ error() }}</p>
      <button (click)="retry.emit()">Tentar novamente</button>
    </div>
  } @else if (veiculos().content.length === 0) {
    <div class="empty-container">
      <span class="empty-icon">🔍</span>
      <h3>Nenhum veículo encontrado</h3>
      <p>Tente ajustar os filtros ou verifique novamente mais tarde.</p>
    </div>
  } @else {
    <div class="catalog-content">
      <div class="vehicles-list">
        @for (veiculo of veiculos().content; track veiculo.id) {
          <app-vehicle-card
            [veiculo]="veiculo"
            [whatsappUrl]="generateWhatsappLink(veiculo.marca, veiculo.modelo)"
            (vehicleClick) = "onVehicleClick($event)">
          </app-vehicle-card>
        }
      </div>
      <div class="paginator-wrapper">
        <mat-paginator
          [length]="veiculos().totalElements"
          [pageSize]="6"
          [pageSizeOptions]="[6]"
          [pageIndex]="veiculos().number"
          (page)="onPageChange($event)"
          aria-label="Selecionar página"
          showFirstLastButtons>
        </mat-paginator>
      </div>
    </div>
  }
</main>
