<aside class="filters-sidebar">
  <div class="filters-container">
    <h3>Filtros</h3>
    <div class="filter-group">
      <label>Marca</label>
      <app-selector-input
        #marcaSelector
        [options]="marcasOptions()"
        placeholder="Qualquer marca"
        icon="directions_car"
        (valueChange)="onMarcaChange($event)"/>
    </div>
    <div class="filter-group">
      <label>Modelo</label>
      <app-selector-input
        #modeloSelector
        [options]="modelosOptions()"
        placeholder="Qualquer modelo"
        icon="description"
        (valueChange)="onModeloChange($event)"/>
    </div>
    <div class="filter-group">
      <label>Ano</label>
      <app-selector-input
        #anoSelector
        [options]="anosOptions()"
        placeholder="Qualquer ano"
        icon="calendar_today"
        (valueChange)="onAnoChange($event)"/>
    </div>
    <div class="filter-group">
      <label>Combustível</label>
      <app-selector-input
        #combustivelSelector
        [options]="combustiveisOptions()"
        placeholder="Qualquer combustível"
        icon="local_gas_station"
        (valueChange)="onCombustivelChange($event)"/>
    </div>
    <div class="filter-actions">
      <button class="btn-search" (click)="buscar()">
        <span class="app-icon">search</span>
        Buscar
      </button>
      <button class="btn-clear-filters" (click)="limparFiltros()">
        Limpar
      </button>
    </div>
  </div>
</aside>
