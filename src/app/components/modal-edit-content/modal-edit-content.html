<div class="modal-header">
  <h2>Editar Veículo</h2>
  <button class="modal-close" (click)="onClose()">
    <span class="app-icon">close</span>
  </button>
</div>

<form [formGroup]="addForm" (ngSubmit)="onSubmit()">
  <div class="modal-grid">
    <div class="form-group">
      <label>Marca *</label>
      <input type="text" formControlName="marca" />
    </div>

    <div class="form-group">
      <label>Modelo *</label>
      <input type="text" formControlName="modelo" />
    </div>

    <div class="form-group">
      <label>Ano *</label>
      <input type="number" formControlName="ano" [min]="1950"
        [max]="currentYear" />
    </div>

    <div class="form-group">
      <label>KM *</label>
      <input type="number" formControlName="quilometragem" min="0"
        step="1000" />
    </div>

    <div class="form-group">
      <label>Cor *</label>
      <input type="text" formControlName="cor" />
    </div>

    <div class="form-group">
      <label>Combustível *</label>
      <select formControlName="combustivel">
        @for (option of combustivelOptions; track option) {
        <option [value]="option">{{ option }}</option>
        }
      </select>
    </div>

    <div class="form-group full">
      <label>Descrição</label>
      <textarea formControlName="descricao" rows="4"></textarea>
    </div>

    <div class="form-group full">
      <label>Imagens</label>
      <input type="file" multiple (change)="onFileSelected($event)"
        accept="image/jpeg,image/png,image/webp" />

      @if (getImagensParaExibir().length > 0) {
      <div class="image-preview">
        @for (img of getImagensParaExibir(); track $index) {
        <div class="image-item">
          @if (img.imagePath) {
          <img [src]="getImageUrl(img.imagePath)" class="image-thumb" />
          } @else if (img.file) {
          <img [src]="getObjectURL(img.file)" class="image-thumb" />
          }
          <span>{{ img.file?.name || 'Imagem existente' }}</span>
          <button type="button" (click)="removeImagem($index)">
            <span class="app-icon">delete</span>
          </button>
        </div>
        }
      </div>
      }
    </div>

    <div class="form-group full">
      <label class="checkbox-label">
        <input type="checkbox" formControlName="destaque" />
        <span>Destaque na homepage?</span>
      </label>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-ghost"
      (click)="onClose()">Cancelar</button>
    <button type="submit" class="btn btn-primary"
      [disabled]="addForm.invalid">Salvar Alterações</button>
  </div>
</form>
