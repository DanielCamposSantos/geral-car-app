<header class="header">
  <div class="container header-inner">

    <button class="logo" routerLink="/home">
      <img src="images/GERAL CAR.svg" alt="Geral Car">
    </button>

    <nav class="nav">

      <a
        class="nav-link"
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }">
        Início
      </a>

      <a
        class="nav-link"
        routerLink="/catalog"
        routerLinkActive="active">
        Catálogo
      </a>

      <a
        class="nav-link"
        routerLink="/testimonials"
        routerLinkActive="active">
        Depoimentos
      </a>

    </nav>

    <div class="header-actions">
      <a class="btn btn-ghost btn-sm" [routerLink]="['/admin']">
        <span class="app-icon">admin_panel_settings</span>
        Admin
      </a>
    </div>

  </div>
</header>
