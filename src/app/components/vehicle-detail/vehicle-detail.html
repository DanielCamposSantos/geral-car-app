<section class="detail-page">
  <div class="container">
    <div class="detail-back" (click)="onBack()">
      <span class="app-icon">arrow_back</span>
      Voltar ao catálogo
    </div>
    <div class="detail-layout">
      <div class="gallery-section">
        <app-galery
          [images]="veiculoAtual().imagens"
          [veiculo]="veiculoAtual()">
        </app-galery>

        <div class="specs-card">  
          <h3>Especificações Técnicas</h3>
          <app-specs-table
            [veiculo]="veiculoAtual()"></app-specs-table>
        </div>
      </div>

      <div class="info-section">

        <div class="detail-card">
          <div class="detail-title">{{ veiculoTitle() }}</div>
          <div class="detail-subtitle">{{ veiculoSubtitle() }}</div>
        </div>

        <div class="detail-card">
          <h3 class="descricao-title">Descrição</h3>
          <p class="detail-desc">{{ veiculoAtual().descricao }}</p>
        </div>

        <div class="detail-card cta-card">
          <div class="seller-card">
            <div class="seller-info">
              <h4>Atendimento Geral Car</h4>
              <p>Disponível via WhatsApp</p>
            </div>
          </div>
          <div class="cta-buttons">
            <a [href]="whatsappLink()" class="btn btn-primary" target="_blank">
              <span class="app-icon">chat</span>
              Entrar em contato
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
